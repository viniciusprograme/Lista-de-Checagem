version: '3.8'

services:
  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/letsencrypt
      - static_files:/data/checklist
    depends_on:
      - web
    restart: unless-stopped

  web:
    build:
      context: ../
      dockerfile: infra/Dockerfile
    env_file:
      - .env
    volumes:
      - static_files:/data/checklist
    ports:
      - "8000:8000"
    expose:
      - "8000"
    depends_on:
      - db
      - redis
      - minio
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: checklist_db
      POSTGRES_USER: checklist_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init_db:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped

  backup:
    image: alpine:3.18
    env_file:
      - .env
    volumes:
      - static_files:/data/checklist
      - pgdata:/var/lib/postgresql/data:ro
    entrypoint: ["/bin/sh","/backup/backup.sh"]
    depends_on:
      - db
      - minio
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:2.48.1
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.1.3
    ports:
      - "3000:3000"
    volumes:
      - grafanadata:/var/lib/grafana

volumes:
  pgdata:
  redisdata:
  miniodata:
  static_files:
  grafanadata:

networks:
  default:
    driver: bridge
