{% extends 'layout.html' %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<h3>Checklists</h3>
<table class="table table-striped">
  <thead>
    <tr>
      <th>ID</th>
      <th>Data</th>
      <th>Técnico</th>
      <th>Equipamento</th>
      <th>Local</th>
    </tr>
  </thead>
  <tbody>
    {% for c in checklists %}
    <tr>
      <td>{{c.id}}</td>
      <td>{{c.data}}</td>
      <td>{{c.tecnico}}</td>
      <td>{{c.equipamento}}</td>
      <td>{{c.local}}</td>
    </tr>
    {% else %}
    <tr><td colspan="5">Nenhum checklist encontrado.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
